syntax = "proto3";

package boarding;

option go_package = "airport-simulator/proto/boarding";


message BoardingRequest {
  int32 flight_id = 1;
  int32 user_id = 2;
  string seat_number = 3;
}

message BoardingResponse {
  string status = 1;
}

service BoardingService {
  rpc OnboardUser(BoardingRequest) returns (BoardingResponse)
}
