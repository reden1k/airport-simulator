syntax = "proto3";

package booking;

option go_package = "airport-simulator/proto/booking";


message BookingRequest {
  int32 user_id = 1;
  int32 flight_id = 2;
  string seat_number = 3;
}

message BookingResponse {
  int32 booking_id = 1;
  string seat_number = 2;
  int32 flight_id = 3;
  string status = 4;
}

service BookingService {
  rpc BookSeat(BookingRequest) returns (BookingResponse);
  rpc CancelBooking(BookingRequest) returns (BookingResponse);
}
